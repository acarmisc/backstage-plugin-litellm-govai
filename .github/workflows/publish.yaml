name: Publish to npm

on:
  push:
    tags:
      - 'litellm-backend-v*'
      - 'litellm-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (litellm or litellm-backend)'
        required: true
        default: 'litellm'
      version:
        description: 'Version tag (e.g., 0.0.1)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine package
        id: pkg
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "package=${{ github.event.inputs.package }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == litellm-backend-v* ]]; then
              echo "package=litellm-backend" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == litellm-v* ]]; then
              echo "package=litellm" >> "$GITHUB_OUTPUT"
            else
              echo "Unknown tag format: $TAG"
              exit 1
            fi
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --immutable || npm install

      - name: Install package-specific build deps
        run: |
          if [ "${{ steps.pkg.outputs.package }}" == "litellm" ]; then
            cd packages/plugin-litellm && npm install
          else
            cd packages/plugin-litellm-backend && npm install
          fi

      - name: Build package
        run: |
          if [ "${{ steps.pkg.outputs.package }}" == "litellm" ]; then
            cd packages/plugin-litellm && npm run build
          else
            cd packages/plugin-litellm-backend && node build.js
          fi

      - name: Publish
        run: |
          if [ "${{ steps.pkg.outputs.package }}" == "litellm" ]; then
            cd packages/plugin-litellm
          else
            cd packages/plugin-litellm-backend
          fi
          npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}