name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (litellm or litellm-backend)'
        required: true
        default: 'litellm'
      version:
        description: 'Version tag (e.g., 0.0.1)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --immutable || npm install

      - name: Build package
        run: |
          if [ "${{ github.event.inputs.package }}" == "litellm" ]; then
            cd packages/plugin-litellm && npm run build
          else
            cd packages/plugin-litellm-backend && node build.js
          fi

      - name: Publish
        run: |
          cd packages/${{ github.event.inputs.package }}
          npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}