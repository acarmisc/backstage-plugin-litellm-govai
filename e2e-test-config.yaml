# End-to-End Test Configuration for LiteLLM Backstage Plugin
# Based on backstage-app-secret from backstage namespace

# LiteLLM Service Configuration
litellm:
  baseUrl: http://localhost:4000
  masterKey: "sk-iU3...vT9c="  # Replace with actual master key from secret
  
# Backstage Backend Configuration
backend:
  secret: "NqGkyw+yFmoHsN+lUJTcVrqC5BJoap5uHtpjQC8gmxQ="
  baseUrl: http://localhost:7007
  listener:
    hostname: 0.0.0.0
    port: 7007

# OIDC Configuration for SSO testing
auth:
  providers:
    keycloak:
      development:
        clientId: "backstage-org-sync"
        clientSecret: "Br3c1wu6Z7LpD60fG54NV7KVVeImcXCV"
        metadataUrl: "http://localhost:8080/realms/backstage/.well-known/openid-configuration"
        authorizationUrl: "http://localhost:8080/realms/backstage/protocol/openid-connect/auth"
        tokenUrl: "http://localhost:8080/realms/backstage/protocol/openid-connect/token"
        scopes: ["openid", "profile", "email"]
        
# GitLab Integration Testing
integrations:
  gitlab:
    - host: gitlab.az.abssrv.it
      token: "glp-g2sSwVGeeq7YxMmpvV-"

# Testing Configuration
e2e:
  # Enable E2E test mode
  enabled: true
  # Base URL for testing
  baseUrl: http://localhost:3000
  # Timeout for operations
  timeout: 30000
  # Test user credentials (for SSO testing)
  testUser:
    username: "testuser@example.com"
    password: "testpassword123"  # This should be in 1Password

# API Endpoints to Test
testEndpoints:
  - path: "/api/litellm/health"
    method: "GET"
  - path: "/api/litellm/user/info"
    method: "GET"
  - path: "/api/litellm/keys"
    method: "GET"
  - path: "/api/litellm/keys/generate"
    method: "POST"
  - path: "/api/litellm/models"
    method: "GET"
  - path: "/api/litellm/teams"
    method: "GET"
  - path: "/api/litellm/usage"
    method: "GET"
  - path: "/api/litellm/teams/:teamId/usage"
    method: "GET"

# Visual Regression Tests
visualTests:
  # Check if key text is visible (Issue #2)
  - page: "/litellm"
    selector: ".MuiChip-root"
    checkColor: true
    expectedContrast: 4.5
    
  # Check if model list is visible (Issue #7)
  - page: "/litellm"
    selector: ".MuiSelect-select"
    checkTextVisibility: true
    
  # Check period selector behavior (Issue #3)
  - page: "/litellm"
    selector: ".MuiSelect-select[label='Period']"
    expectedValue: "Today"
    
  # Check analytics update frequency (Issue #9)
  - page: "/litellm"
    selector: ".recharts-text"
    checkForUpdates: true

# Kubernetes Deployment Testing
k8s:
  namespace: backstage
  secretName: backstage-app-secret
  deploymentName: backstage
  containerName: backstage
  # Service port mapping
  ports:
    - name: http
      containerPort: 7007
      servicePort: 80
    - name: litellm
      containerPort: 4000
      servicePort: 4000

# Local Development Settings
development:
  # Enable debug mode for testing
  debug: true
  # Log level
  logLevel: debug
  # Hot reload
  hotReload: true
